name = "quackplan"
main = "worker/index.js"
compatibility_date = "2025-05-08"

# Custom domains (Cloudflare provisions DNS + SSL automatically on deploy).
# www redirects to the apex client-side (see the canonical-origin guard in index.html).
routes = [
  { pattern = "quackplan.com", custom_domain = true },
  { pattern = "www.quackplan.com", custom_domain = true },
]

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database. Create it once with:  wrangler d1 create quackplan-db
# then paste the returned database_id below (local dev works without it).
[[d1_databases]]
binding = "DB"
database_name = "quackplan-db"
database_id = "859d1108-b3dc-4ad8-a801-6a07e22b7fa6"
migrations_dir = "migrations"
